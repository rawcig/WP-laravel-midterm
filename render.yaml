services:
  - type: web
    name: event-mgt
    runtime: php
    region: singapore
    buildCommand: composer install --no-dev --optimize-autoloader && npm install && npm run build && php artisan config:cache && php artisan route:cache && php artisan migrate --force
    startCommand: php -S 0.0.0.0:$PORT -t public
    envVars:
      - key: PHP_VERSION
        value: "8.2"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
    disk:
      name: uploads
      mountPath: /var/www/storage/app/public